syntax = "proto3";

package sentinel.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/NurfitraPujo/sentinel/gen/sentinel/v1;sentinelv1";

message ErrorEventTemplate {
  string project_key = 1;
  string platform = 2;
  string environment = 3;
  string message = 4;
  string error_class = 5;
  string trace_id = 6;
  string span_id = 7;
  repeated StackFrameTemplate stacktrace = 8;
  google.protobuf.Struct metadata = 9;
  google.protobuf.Timestamp timestamp = 10;
  uint32 trace_flags = 11;
}

message StackFrameTemplate {
    string file = 1;      // e.g., app/controllers/user_controller.rb
    int32 line = 2;
    string function = 3;  // e.g., UpdateProfile
    bool in_app = 4;      // Flag to identify if it's our code vs vendor/stdlib
}
